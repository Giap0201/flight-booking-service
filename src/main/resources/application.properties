# ==========================================
# 1. SERVER CONFIGURATION
# ==========================================
server.port=${PORT:8080}
server.servlet.context-path=/api
spring.application.name=flight-booking-service

# ==========================================
# 2. DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flight_booking_db?currentSchema=public&reWriteBatchedInserts=true}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:1}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

